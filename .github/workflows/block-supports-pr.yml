name: Block support PRs
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  block_support_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if source is support/*
        if: startsWith(github.head_ref, 'support/')
        run: |
          echo "support/* ブランチからの PR は禁止されています"
          exit 1
